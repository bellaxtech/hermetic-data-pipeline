# ============================================================================
# Spark Configuration Defaults for Iceberg + HiveMetastore
# ============================================================================
# This file provides sensible defaults for PySpark jobs in the hermetic data
# pipeline. Copy to $SPARK_HOME/conf/spark-defaults.conf or pass via
# --properties-file when using spark-submit.
#
# Usage:
#   cp config/spark_defaults.conf $SPARK_HOME/conf/
#   # OR
#   spark-submit --properties-file config/spark_defaults.conf job.py
#
# ============================================================================

# ---------------------------------------------------------------------------
# Spark Core
# ---------------------------------------------------------------------------
spark.master                      spark://spark-master:7077
spark.submit.deployMode           cluster
spark.app.name                    HermeticDataPipeline

# Resource allocation
spark.driver.memory               4g
spark.driver.cores                2
spark.executor.memory             8g
spark.executor.cores              4
spark.executor.instances          4
spark.dynamicAllocation.enabled   true
spark.dynamicAllocation.minExecutors 2
spark.dynamicAllocation.maxExecutors 10
spark.dynamicAllocation.initialExecutors 4

# Shuffle
spark.sql.shuffle.partitions      16
spark.sql.adaptive.enabled        true
spark.sql.adaptive.coalescePartitions.enabled true
spark.sql.adaptive.skewJoin.enabled true

# ---------------------------------------------------------------------------
# Iceberg Catalog Configuration
# ---------------------------------------------------------------------------
# Primary catalog for all Iceberg tables
spark.sql.catalog.iceberg_catalog               org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.iceberg_catalog.type          hive
spark.sql.catalog.iceberg_catalog.warehouse     s3a://data-warehouse/iceberg
spark.sql.catalog.iceberg_catalog.uri           thrift://hive-metastore:9083
spark.sql.catalog.iceberg_catalog.cache-enabled false

# Spark Session Catalog (for Hive tables)
spark.sql.catalog.spark_catalog                 org.apache.iceberg.spark.SparkSessionCatalog
spark.sql.catalog.spark_catalog.type            hive
spark.sql.catalog.spark_catalog.warehouse       s3a://data-warehouse/hive
spark.sql.catalog.spark_catalog.cache-enabled   false

# Iceberg Spark Extensions (required for MERGE INTO, CALL procedures, etc.)
spark.sql.extensions                            org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# Iceberg SQL extensions (CALL procedures like rollback_to_snapshot, rewrite_data_files)
spark.sql.iceberg.handle-timestamp-without-timezone  false

# ---------------------------------------------------------------------------
# Iceberg Table Defaults
# ---------------------------------------------------------------------------
spark.sql.iceberg.default-format-version        2
spark.sql.sources.partitionOverwriteMode        dynamic
spark.sql.iceberg.delete-mode                   copy-on-write
spark.sql.iceberg.update-mode                   copy-on-write
spark.sql.iceberg.merge-mode                    copy-on-write

# ---------------------------------------------------------------------------
# S3 / Object Store Configuration
# ---------------------------------------------------------------------------
spark.hadoop.fs.s3a.impl                        org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.access.key                  ${AWS_ACCESS_KEY_ID}
spark.hadoop.fs.s3a.secret.key                  ${AWS_SECRET_ACCESS_KEY}
spark.hadoop.fs.s3a.endpoint                    http://minio:9000
spark.hadoop.fs.s3a.path.style.access           true
spark.hadoop.fs.s3a.connection.ssl.enabled      false
spark.hadoop.fs.s3a.connection.timeout          60
spark.hadoop.fs.s3a.threads.max                 40
spark.hadoop.fs.s3a.readahead.range             64K
spark.hadoop.fs.s3a.fast.upload                 true
spark.hadoop.fs.s3a.fast.upload.buffer          bytebuffer
spark.hadoop.fs.s3a.fast.upload.active.blocks   8

# ---------------------------------------------------------------------------
# Hive Metastore Configuration
# ---------------------------------------------------------------------------
spark.sql.hive.metastore.version                3.1.3
spark.sql.hive.metastore.jars                   builtin
hive.metastore.uris                             thrift://hive-metastore:9083
hive.metastore.sasl.enabled                     false
spark.sql.hive.convertMetastoreParquet          true
spark.sql.hive.convertMetastoreOrc              true

# ---------------------------------------------------------------------------
# Parquet Configuration
# ---------------------------------------------------------------------------
spark.sql.parquet.writeLegacyFormat             false
spark.sql.parquet.compression.codec             snappy
spark.sql.parquet.mergeSchema                   false
spark.sql.parquet.filterPushdown                true
spark.sql.parquet.recordLevelValidation.enabled false

# ---------------------------------------------------------------------------
# Performance Tuning
# ---------------------------------------------------------------------------
spark.sql.codegen.wholeStage                    true
spark.sql.broadcastTimeout                      600
spark.sql.autoBroadcastJoinThreshold            10485760  # 10 MB
spark.sql.files.maxPartitionBytes               268435456  # 256 MB
spark.sql.files.openCostInBytes                 4194304    # 4 MB
spark.sql.broadcastTimeout                      3600

# Execution
spark.executor.heartbeatInterval                60s
spark.network.timeout                           600s
spark.sql.broadcastTimeout                      1200s
spark.serializer                                org.apache.spark.serializer.KryoSerializer
spark.kryoserializer.buffer.max                 1024m

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
spark.authenticate                              false
spark.hadoop.hadoop.security.authentication     simple
spark.acls.enable                               true
spark.admin.acls                                admin

# Kerberos (uncomment if Kerberized cluster)
# spark.yarn.principal                           pipeline-svc@CORP.EXAMPLE.COM
# spark.yarn.keytab                              /etc/security/pipeline.keytab
# hive.metastore.kerberos.principal              hive/_HOST@CORP.EXAMPLE.COM
# spark.kerberos.access.hadoopFileSystems        hdfs://namenode:8020

# ---------------------------------------------------------------------------
# Logging & Monitoring
# ---------------------------------------------------------------------------
spark.eventLog.enabled                          true
spark.eventLog.dir                              /var/log/spark/events
spark.history.fs.logDirectory                   /var/log/spark/events
spark.sql.ui.retainedExecutions                 200
spark.ui.showConsoleProgress                    true
spark.extraListeners                            org.apache.spark.sql.ExplainPlanListener
